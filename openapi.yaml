openapi: 3.0.3

info:
  title: Task Manager API
  version: 1.0.0
  description: |
    Task management system with projects, tasks, comments, authentication,
    webhooks, events, queue processing and audit logs.

servers:
  - url: http://localhost:8000/api

security:
  - sanctumAuth: []


paths:


  /login:
    post:
      security: []
      summary: Create Sanctum token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Token created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "422":
          $ref: "#/components/responses/ValidationError"

  /user:
    get:
      summary: Current authenticated user
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"



  /health:
    get:
      security: []
      summary: Health check
      responses:
        "200":
          description: OK

  /ready:
    get:
      security: []
      summary: Readiness (DB + Redis)
      responses:
        "200":
          description: Ready
        "503":
          description: Not ready

  /metrics:
    get:
      security: []
      summary: System metrics
      responses:
        "200":
          description: Metrics



  /projects:
    get:
      summary: List projects
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"

    post:
      summary: Create project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectCreateRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "422":
          $ref: "#/components/responses/ValidationError"

  /projects/{project}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"

    get:
      summary: Get project
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      summary: Update project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdateRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

    delete:
      summary: Delete project
      responses:
        "204":
          description: Deleted



  /projects/{project}/tasks:
    parameters:
      - $ref: "#/components/parameters/ProjectId"

    get:
      summary: List tasks
      parameters:
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: priority
          schema: { type: string }
        - in: query
          name: search
          schema: { type: string }
      responses:
        "200":
          description: Tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"

    post:
      summary: Create task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskCreateRequest"
      responses:
        "201":
          description: Created task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /projects/{project}/tasks/{task}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/TaskId"

    get:
      summary: Get task
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

    put:
      summary: Update task (status change triggers events)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdateRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

    delete:
      summary: Delete task
      responses:
        "204":
          description: Deleted



  /tasks/{task}/comments:
    parameters:
      - $ref: "#/components/parameters/TaskId"

    get:
      summary: List comments (paginated)
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Comment"
                  meta:
                    type: object

    post:
      summary: Create comment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentCreateRequest"
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"

  /tasks/{task}/comments/{comment}:
    parameters:
      - $ref: "#/components/parameters/TaskId"
      - $ref: "#/components/parameters/CommentId"

    get:
      summary: Get comment
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"

    put:
      summary: Update comment
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"

    delete:
      summary: Delete comment
      responses:
        "204":
          description: Deleted



  /projects/{project}/webhooks:
    parameters:
      - $ref: "#/components/parameters/ProjectId"

    get:
      summary: List webhooks
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Webhook"

    post:
      summary: Create webhook subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookCreateRequest"
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"

  /projects/{project}/webhooks/{webhook}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/WebhookId"

    delete:
      summary: Delete webhook
      responses:
        "204":
          description: Deleted



components:

  securitySchemes:
    sanctumAuth:
      type: http
      scheme: bearer



  parameters:
    ProjectId:
      name: project
      in: path
      required: true
      schema: { type: integer }

    TaskId:
      name: task
      in: path
      required: true
      schema: { type: integer }

    CommentId:
      name: comment
      in: path
      required: true
      schema: { type: integer }

    WebhookId:
      name: webhook
      in: path
      required: true
      schema: { type: integer }



  responses:
    Unauthorized:
      description: Unauthorized

    NotFound:
      description: Not Found

    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              errors:
                type: object



  schemas:

    User:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string }

    Project:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        owner_id: { type: integer }

    Task:
      type: object
      properties:
        id: { type: integer }
        project_id: { type: integer }
        title: { type: string }
        description: { type: string }
        status: { type: string }
        priority: { type: string }
        due_date: { type: string, format: date-time }

    Comment:
      type: object
      properties:
        id: { type: integer }
        task_id: { type: integer }
        user_id: { type: integer }
        body: { type: string }

    Webhook:
      type: object
      properties:
        id: { type: integer }
        project_id: { type: integer }
        url: { type: string }
        enabled: { type: boolean }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string }
        password: { type: string }

    TokenResponse:
      type: object
      properties:
        token: { type: string }

    ProjectCreateRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }

    ProjectUpdateRequest:
      type: object
      properties:
        name: { type: string }

    TaskCreateRequest:
      type: object
      required: [title]
      properties:
        title: { type: string }
        description: { type: string }
        status: { type: string }
        priority: { type: string }

    TaskUpdateRequest:
      type: object
      properties:
        title: { type: string }
        status: { type: string }
        priority: { type: string }

    CommentCreateRequest:
      type: object
      required: [body]
      properties:
        body: { type: string }

    WebhookCreateRequest:
      type: object
      required: [url, secret]
      properties:
        url: { type: string }
        secret: { type: string }
        enabled: { type: boolean }
